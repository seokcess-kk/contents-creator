services:
  - type: web
    name: contents-creator-api
    runtime: docker
    # 2026-04-29: APScheduler in-process cron + WebSocket 끊김 방지를 위해 always-on Starter 채택.
    # 브랜드 카드 Playwright 사용 시 메모리 빠듯할 수 있어 Standard 업그레이드 필요 — 운영 모니터링 후 결정.
    plan: starter
    dockerfilePath: ./Dockerfile
    # 환경변수는 전부 런타임 주입 (sync: false → Render 대시보드에서 수동 입력).
    # Dockerfile 에는 .env 를 COPY 하지 않으며 .dockerignore 가 추가로 차단한다.
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BRIGHT_DATA_API_KEY
        sync: false
      - key: BRIGHT_DATA_WEB_UNLOCKER_ZONE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # 웹 API 인증용. 미설정 시 백엔드가 dev 모드(인증 비활성) 로 동작한다.
      # 프론트엔드 NEXT_PUBLIC_API_KEY 와 동일 값 주입 필요.
      - key: ADMIN_API_KEY
        sync: false
      # 단일 job 최대 실행 시간(초). 초과 시 soft timeout (상태만 timed_out 으로 전환).
      - key: JOB_TIMEOUT_SECONDS
        value: "3600"
      # 네이버 검색광고 API (키워드도구 - 월간 검색량). 미설정 시 검색량 None 폴백, 분석 자체는 진행.
      - key: NAVER_AD_API_KEY
        sync: false
      - key: NAVER_AD_SECRET_KEY
        sync: false
      - key: NAVER_AD_CUSTOMER_ID
        sync: false
      # 2026-05-11 — Playwright 브라우저 캐시 경로. Dockerfile 의 ENV 와 동일
      # 값이지만 Render 런타임에서 ENV 가 누락되어 default cache(/opt/render/
      # .cache/ms-playwright) 로 폴백되던 사고 차단. 빌드 시 /ms-playwright 에
      # install 한 chromium 을 런타임에서도 같은 경로로 찾도록 보장.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
