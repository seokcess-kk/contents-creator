name: ranking-daily-check

# 매일 09:00 KST = 00:00 UTC 에 발화.
# in-process APScheduler 는 컨테이너 재시작·OOM 으로 누락이 발생해
# (2026-04-30, 2026-05-01 실측 사고) 외부 cron 으로 분리한다.
# GitHub Actions 는 우리 컨테이너 lifecycle 과 완전히 독립이라 누락 불가능.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 운영자 수동 트리거용
    inputs:
      reason:
        description: "수동 실행 사유 (감사 로그)"
        required: false
        default: "manual run"

permissions:
  contents: read
  issues: write # 실패 시 이슈 자동 생성

concurrency:
  # 매일 cron 이 겹치면 의미 없음 — 동시 실행 차단
  group: ranking-daily-check
  cancel-in-progress: false

jobs:
  trigger:
    name: POST /api/rankings/check-all
    runs-on: ubuntu-latest
    # 30 분 — check-all 자체는 BackgroundTasks 라 즉시 202, 그 후 polling 으로
    # 결과 검증까지 포함. publication 100건 × 1초 sleep 도 여유 있게 흡수.
    timeout-minutes: 30
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "::error::API_BASE_URL secret 이 설정되지 않았습니다."
            exit 1
          fi
          if [ -z "${{ secrets.ADMIN_API_KEY }}" ]; then
            echo "::error::ADMIN_API_KEY secret 이 설정되지 않았습니다."
            exit 1
          fi

      - name: Trigger ranking check
        id: trigger
        # POST 는 멱등이 아니라 retry 가 위험하다 (2026-05-04 사고: timeout 후
        # curl --retry 가 같은 POST 재전송 → 우리 lock 과 충돌해 409 폭발).
        # 해결: (1) endpoint 를 idempotent 하게 변경 — 이미 실행 중이면 200 +
        # already_running. (2) 여기서도 retry 제거 + max-time 늘려 cold start 흡수.
        # 첫 호출이 timeout/error 여도 fail 하지 않는다 — 검증은 다음 step 의
        # /check-all/last polling 이 책임진다.
        run: |
          set +e
          response=$(curl -sS \
            --max-time 120 \
            -w "\n__HTTP__:%{http_code}\n" \
            -X POST \
            -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.API_BASE_URL }}/api/rankings/check-all")
          exit_code=$?
          echo "::notice::trigger exit=$exit_code 응답=$response"
          # exit 0 유지 — verify step 이 진짜 결과로 판정
          exit 0

      - name: Verify execution result
        id: verify
        # /check-all/last polling — succeeded + errors_count==0 + usage_save_failed_count==0
        # 까지 도달해야 그린. 2026-05-02 silent failure (snapshot 정상 저장됐지만
        # api_usage 0건) 사고 이후 추가된 검증 단계.
        run: |
          set -euo pipefail
          # 최대 25 분 (15초 × 100회) 대기 — publication 수에 비례.
          MAX_ATTEMPTS=100
          SLEEP=15
          attempt=0
          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            sleep $SLEEP
            body=$(curl -sS \
              --max-time 30 \
              -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" \
              "${{ secrets.API_BASE_URL }}/api/rankings/check-all/last")
            status=$(echo "$body" | jq -r '.status // "unknown"')
            echo "[$attempt/$MAX_ATTEMPTS] status=$status body=$body"
            case "$status" in
              succeeded)
                errors=$(echo "$body" | jq -r '.errors_count // 0')
                usage_failed=$(echo "$body" | jq -r '.usage_save_failed_count // 0')
                checked=$(echo "$body" | jq -r '.checked_count // 0')
                {
                  echo "checked=$checked"
                  echo "errors=$errors"
                  echo "usage_failed=$usage_failed"
                  echo "body<<EOF"
                  echo "$body"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
                if [ "$errors" -gt 0 ] || [ "$usage_failed" -gt 0 ]; then
                  echo "::error::측정은 끝났으나 errors=$errors usage_save_failed=$usage_failed"
                  exit 1
                fi
                echo "::notice::정상 종료: checked=$checked errors=0 usage_save_failed=0"
                exit 0
                ;;
              failed)
                echo "::error::orchestrator 가 raise — body=$body"
                {
                  echo "body<<EOF"
                  echo "$body"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
                exit 1
                ;;
              running|never_run)
                # 계속 polling
                ;;
              *)
                echo "::warning::예상치 못한 status=$status"
                ;;
            esac
          done
          echo "::error::polling timeout — $((MAX_ATTEMPTS * SLEEP))초 안에 결과 미수신"
          exit 1

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const verifyBody = `${{ steps.verify.outputs.body || '' }}`;
            const errors = `${{ steps.verify.outputs.errors || '?' }}`;
            const usageFailed = `${{ steps.verify.outputs.usage_failed || '?' }}`;
            const checked = `${{ steps.verify.outputs.checked || '?' }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ranking-cron] ${today} 발화/검증 실패`,
              body: [
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `**카운터**: checked=${checked}, errors=${errors}, usage_save_failed=${usageFailed}`,
                ``,
                `**검증 응답 본문**:`,
                '```json',
                verifyBody || '(no response body)',
                '```',
                ``,
                `즉시 조치: Render Logs 의 \`api_usage 저장 실패\` 또는 \`ranking.check_failed\` 검색.`,
                `재실행: GitHub Actions UI 의 "Run workflow" 버튼.`,
              ].join("\n"),
              labels: ["incident", "ranking-cron"],
            });
